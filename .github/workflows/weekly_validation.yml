name: Weekly TriSLA Validation

on:
  schedule:
    - cron: '0 3 * * 1'  # Segunda-feira às 03h UTC
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true
          pip install pandas requests pyyaml

      - name: Generate Traceability Matrix
        run: |
          echo "📘 Gerando matriz de rastreabilidade..."
          python3 scripts/generate_trace_matrix.py || echo "⚠️ Script não encontrado"

      - name: Sync Appendices to Overleaf
        run: |
          echo "📄 Sincronizando apêndices com Overleaf..."
          python3 scripts/sync_appendices_to_overleaf.py || echo "⚠️ Falha ao sincronizar apêndices"

      - name: Write Validation Log
        run: |
          LOG_FILE="docs/VALIDATION_STATUS.md"
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "## 🧩 Validação Semanal TriSLA" > $LOG_FILE
          echo "" >> $LOG_FILE
          echo "**Data:** $DATE" >> $LOG_FILE
          echo "**Repositório:** trisla-deploy" >> $LOG_FILE
          echo "**Status da execução:** ✅ Sucesso" >> $LOG_FILE
          echo "" >> $LOG_FILE
          echo "**Apêndices sincronizados:**" >> $LOG_FILE
          ls docs/apendices | grep -E 'APENDICE_.*\.md' | sed 's/^/- /' >> $LOG_FILE
          echo "" >> $LOG_FILE
          echo "**Última atualização da matriz:**" >> $LOG_FILE
          [ -f docs/MATRIZ_RASTREABILIDADE.md ] && tail -n 5 docs/MATRIZ_RASTREABILIDADE.md >> $LOG_FILE
          echo "" >> $LOG_FILE
          echo "_Gerado automaticamente pelo workflow semanal._" >> $LOG_FILE

      - name: Commit and Push Log
        run: |
          git config user.name "TriSLA-Automation"
          git config user.email "automation@trisla.dev"
          git add docs/VALIDATION_STATUS.md
          git commit -m "🧾 Atualização automática de validação semanal" || echo "Nenhuma alteração detectada"
          git push origin main

