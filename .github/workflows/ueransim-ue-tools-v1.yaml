name: UERANSIM UE Tools V1 — GHCR Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/ueransim-ue-tools/**'
      - '.github/workflows/ueransim-ue-tools-v1.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/abelisboa/trisla-ueransim-ue-tools-v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          echo "build_tag=${TS}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_NAME }}:${TS}" >> "$GITHUB_OUTPUT"

      - name: Build and push (digest-only deploy downstream)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./infra/ueransim-ue-tools
          file: ./infra/ueransim-ue-tools/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}
          provenance: false
          sbom: false

      - name: Write digest artifact
        run: |
          echo "${{ steps.build.outputs.digest }}" | tee image_digest.txt
          echo "build_tag=${{ steps.meta.outputs.build_tag }}" | tee -a image_digest.txt
          echo "image_ref=${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" | tee -a image_digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: ueransim-ue-tools-v1-digest
          path: image_digest.txt
