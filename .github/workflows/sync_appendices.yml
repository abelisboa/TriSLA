name: Sync Appendices to Overleaf

on:
  push:
    paths:
      - 'docs/apendices/**'
  workflow_dispatch:  # Permite execução manual

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip

      - name: Run synchronization script
        run: |
          python3 scripts/sync_appendices_to_overleaf.py
      
      - name: Display sync status
        run: |
          echo "✅ Sincronização de apêndices concluída"
          echo "📝 Nota: Para sincronizar com Overleaf, execute manualmente ou configure acesso ao repositório Overleaf"
      
