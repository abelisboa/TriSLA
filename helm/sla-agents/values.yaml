# TriSLA SLA-Agent Layer - Helm Values
# Camada Federada de Agentes SLA

# Configurações principais
replicaCount: 1

# Imagem
image:
  repository: ghcr.io/abelisboa/trisla-sla-agents
  tag: latest
  pullPolicy: IfNotPresent

# Configurações do container
container:
  name: sla-agents
  port: 8080

# Configurações de ambiente
env:
  PYTHONPATH: "/app"
  PYTHONUNBUFFERED: "1"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  MONITORING_INTERVAL: "5.0"
  LOG_LEVEL: "INFO"

# Configurações dos agentes
agents:
  ran:
    enabled: true
    monitoringInterval: 1.0
    cells: ["cell-001", "cell-002", "cell-003", "cell-004", "cell-005"]
  tn:
    enabled: true
    monitoringInterval: 2.0
    links: ["link-001", "link-002", "link-003", "link-004", "link-005"]
  core:
    enabled: true
    monitoringInterval: 3.0
    services: ["amf", "smf", "upf", "pcf", "udm", "ausf", "nrf", "nssf"]

# Recursos
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Health checks
healthCheck:
  livenessProbe:
    exec:
      command:
        - python
        - -c
        - "import asyncio; print('SLA-Agent Layer healthy')"
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - python
        - -c
        - "import asyncio; print('SLA-Agent Layer ready')"
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Configurações de rede
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# Configurações de segurança
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Configurações de persistência
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

# Configurações de monitoramento
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics

# Configurações de ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: sla-agents.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Configurações de node selector
nodeSelector: {}

# Configurações de tolerations
tolerations: []

# Configurações de affinity
affinity: {}

# Configurações de labels e annotations
labels: {}
annotations: {}

# Image pull secrets
imagePullSecrets: []




