# TriSLA Decision Engine - Helm Values
# Motor de decisão central da arquitetura TriSLA

# Configurações principais
replicaCount: 1

# Imagem
image:
  repository: ghcr.io/abelisboa/trisla-decision-engine
  tag: latest
  pullPolicy: IfNotPresent

# Configurações do container
container:
  name: decision-engine
  port: 8080
  grpcPort: 50051

# Configurações de ambiente
env:
  PYTHONPATH: "/app"
  PYTHONUNBUFFERED: "1"
  DECISION_ENGINE_PORT: "8080"
  GRPC_PORT: "50051"
  LOG_LEVEL: "INFO"

# Configurações dos módulos
modules:
  semNsmfUrl: "http://sem-nsmf:8080"
  mlNsmfUrl: "http://ml-nsmf:8080"
  bcNssmfUrl: "http://bc-nssmf:8080"
  naspApiUrl: "http://nasp-api:8080"

# Recursos
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Health checks
healthCheck:
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Configurações de rede
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  grpcPort: 50051
  grpcTargetPort: 50051

# Configurações de segurança
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Configurações de persistência
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

# Configurações de monitoramento
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /metrics

# Configurações de ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: decision-engine.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Configurações de node selector
nodeSelector: {}

# Configurações de tolerations
tolerations: []

# Configurações de affinity
affinity: {}

# Configurações de labels e annotations
labels: {}
annotations: {}

# Image pull secrets
imagePullSecrets: []

