global:
  imageRegistry: ghcr.io/abelisboa
  namespace: trisla

network:
  interface: my5g
  nodeIP: 192.168.10.16
  gateway: 192.168.10.1

semCsmf:
  enabled: true
  image:
    repository: trisla-sem-csmf
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  annotations:
    trisla-mode: degraded
  service:
    type: ClusterIP
    port: 8080
  env:
    DECISION_ENGINE_URL: ''
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2

mlNsmf:
  enabled: true
  image:
    repository: trisla-ml-nsmf
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  env:
    KAFKA_ENABLED: 'false'
    KAFKA_BROKERS: ''
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 4Gi
  replicas: 2

decisionEngine:
  env:
    LOG_LEVEL: DEBUG
  enabled: true
  image:
    repository: ghcr.io/abelisboa/trisla-decision-engine
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8082
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2
  gate3gpp:
    enabled: false

bcNssmf:
  enabled: true
  image:
    repository: trisla-bc-nssmf
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
    healthcheck:
      enabled: false
  annotations:
    trisla-mode: degraded
  env:
    BC_ENABLED: 'true'
    BC_TX_RECEIPT_TIMEOUT: '120'
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2

besu:
  enabled: true
  qbft:
    enabled: true
    useGenesisFile: true
  validatorKeySecret: trisla-besu-validator-key
  image:
    repository: trisla-besu
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8545
    wsPort: 8546
    p2pPort: 30303
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClass: ''
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

slaAgentLayer:
  enabled: true
  image:
    repository: trisla-sla-agent-layer
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8084
  env:
    KAFKA_ENABLED: true
    KAFKA_BROKERS: kafka.trisla.svc.cluster.local:9092
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 3

naspAdapter:
  enabled: true
  image:
    repository: trisla-nasp-adapter
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8085
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2
  gate3gpp:
    enabled: true
    coreNamespace: ns-1274485
    ueransimNamespace: ueransim
    upfMaxSessions: 1000000
  capacityAccounting:
    enabled: true
    reservationTtlSeconds: 300
    reconcileIntervalSeconds: 60
    capacitySafetyFactor: '0.1'
    costEmbbCore: 1
    costEmbbRan: 1
    costEmbbTransport: 1
    costUrllcCore: 1
    costUrllcRan: 1
    costUrllcTransport: 1
    costMmtcCore: 1
    costMmtcRan: 1
    costMmtcTransport: 1
  prometheusUrl: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090

uiDashboard:
  enabled: true
  image:
    repository: trisla-ui-dashboard
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: trisla.local
        paths:
          - path: /
            pathType: Prefix
  replicas: 2

trafficExporter:
  enabled: true
  image:
    repository: trisla-traffic-exporter
    tag: ''
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9105
  replicas: 1

kafka:
  enabled: true
  image:
    repository: ghcr.io/abelisboa/trisla-kafka
    tag: v3.11.2
    digest: ""
    pullPolicy: IfNotPresent
  replicas: 1


otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector
    tag: 0.92.0

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.49.1

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: 10.2.3
  adminPassword: admin

production:
  enabled: true
  simulationMode: false
  useRealServices: true
  executeRealActions: true

imagePullSecrets: []
