global:
  imageRegistry: ghcr.io/abelisboa
  namespace: trisla

network:
  interface: my5g
  nodeIP: 192.168.10.16
  gateway: 192.168.10.1

semCsmf:
  enabled: true
  image:
    repository: trisla-sem-csmf
    tag: ''
    digest: "sha256:1af16f60f1414a5a630f8792caa6540b52e42d1a4f4da8631069efb2f9bb3b23"
    pullPolicy: IfNotPresent
  annotations:
    trisla-mode: degraded
  service:
    type: ClusterIP
    port: 8080
  env:
    DECISION_ENGINE_URL: ''
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2

mlNsmf:
  enabled: true
  image:
    repository: trisla-ml-nsmf
    tag: ''
    digest: "sha256:b0922b2199830a766a6fd999213583973bc8209862f39a949de2d18010017187"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  env:
    KAFKA_ENABLED: 'false'
    KAFKA_BROKERS: ''
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 4Gi
  replicas: 2

decisionEngine:
  env:
    LOG_LEVEL: DEBUG
    # V5 (PROMPT_V5): widen score path (PRB < renegotiate) and delay hard REJECT vs V11 defaults.
    HARD_PRB_RENEGOTIATE: "0.25"
    HARD_PRB_REJECT: "0.40"
    # Phase 2 transport-informed score term (frozen RTT_REF; w=0.05 initial).
    TRISLA_TRANSPORT_RTT_REF_MS: "12.21"
    TRISLA_TRANSPORT_SCORE_WEIGHT: "0.05"
    TRISLA_TRANSPORT_SCORE_WEIGHT_MAX: "0.10"
    TRISLA_TRANSPORT_RTT_GOODNESS_ENABLED: "true"
    # Phase 5: activate latent feasibility term in score_mode (portal sla_metrics parity).
    TRISLA_FEASIBILITY_RUNTIME_ENABLED: "true"
    # Phase 6: activate latent resource_headroom term (g_headroom = 1 - pressure V1).
    TRISLA_RESOURCE_HEADROOM_RUNTIME_ENABLED: "true"
  enabled: true
  image:
    repository: ghcr.io/abelisboa/trisla-decision-engine
    tag: ''
    digest: "sha256:0e58c085eb81f56b593e0f364d17b953cfba7b8d14eddeccd63a96dbb1b42ecf"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8082
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2
  gate3gpp:
    enabled: false

bcNssmf:
  enabled: true
  image:
    repository: trisla-bc-nssmf
    tag: ''
    digest: "sha256:b0db5eef2128baddee2c1c3ea72fb5fec421afb1d87407e5f4a6aadd75f9f95a"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
    healthcheck:
      enabled: false
  annotations:
    trisla-mode: degraded
  env:
    BC_ENABLED: 'true'
    BC_TX_RECEIPT_TIMEOUT: '120'
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2

besu:
  enabled: true
  qbft:
    enabled: true
    useGenesisFile: true
  validatorKeySecret: trisla-besu-validator-key
  image:
    repository: trisla-besu
    tag: ''
    digest: "sha256:ab84d26d678417b615c0833b4a34e9fe2778cec392a7e23596fa1607cf362efc"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8545
    wsPort: 8546
    p2pPort: 30303
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClass: ''
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi

slaAgentLayer:
  enabled: true
  image:
    repository: trisla-sla-agent-layer
    tag: ''
    digest: "sha256:bbca066f4538bad3937d43eea03c3182bb0cfb4963f2ec1743cb8a923a642492"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8084
  env:
    KAFKA_ENABLED: true
    KAFKA_BROKERS: kafka.trisla.svc.cluster.local:9092
    CLOSED_LOOP_ACTUATION_AUDIT_ENABLED: true
    CLOSED_LOOP_ACTUATION_ENABLED: false
    ACTUATION_AUDIT_STORE_PATH: /tmp/trisla_actuation_audit
    ACTUATION_REQUEST_TTL_SECONDS: "300"
    ACTUATION_AUTHORIZATION_TIMEOUT_SECONDS: "300"
    ACTUATION_EXECUTION_TIMEOUT_SECONDS: "120"
    CLOSED_LOOP_TRANSPORT_DRYRUN_ENABLED: "true"
    TN002_LIVE_ENABLED: "false"
    TN002_LIVE_DRYRUN_FALLBACK: "true"
    TN002_FAILED_INTENT_CLEANUP_ENABLED: "false"
    ONOS_REST_URL: http://onos.nasp-transport.svc.cluster.local:8181
    ONOS_REST_AUTH: "onos:rocks"
    ADMISSION_THROTTLE_STORE_PATH: /tmp/trisla_admission_throttle
  actuationAudit:
    enabled: true
  actuationScaffold:
    enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 3

naspAdapter:
  enabled: true
  image:
    repository: trisla-nasp-adapter
    tag: ''
    digest: "sha256:00dff9fbd57b1bdc36f5dd4ceb1274a38ce4d7f62355a341bcfde7082c99cb31"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8085
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  replicas: 2
  gate3gpp:
    enabled: true
    coreNamespace: ns-1274485
    ueransimNamespace: ueransim
    upfMaxSessions: 1000000
  capacityAccounting:
    enabled: true
    reservationTtlSeconds: 300
    reconcileIntervalSeconds: 60
    capacitySafetyFactor: '0.1'
    costEmbbCore: 1
    costEmbbRan: 1
    costEmbbTransport: 1
    costUrllcCore: 1
    costUrllcRan: 1
    costUrllcTransport: 1
    costMmtcCore: 1
    costMmtcRan: 1
    costMmtcTransport: 1
  prometheusUrl: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
  sliceServiceBinding:
    enabled: true
  nssfAdapter:
    enabled: false
  amfSmfBinding:
    amfEnabled: false
    smfEnabled: false
  upfBinding:
    enabled: false
  ranBinding:
    enabled: false
  transportBinding:
    enabled: false
  multidomainMetricsExport:
    enabled: false
    refreshSeconds: 30
  metricsService:
    enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 25s
    sampleLimit: 50000

prometheusRecording:
  enabled: true

uiDashboard:
  enabled: true
  image:
    repository: trisla-ui-dashboard
    tag: ''
    digest: "sha256:16e23f4de91582e56bfe4704c0139a3154c34c4a44780f17f3082b6195dbe6fb"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: trisla.local
        paths:
          - path: /
            pathType: Prefix
  replicas: 2

trafficExporter:
  enabled: true
  image:
    repository: trisla-traffic-exporter
    tag: ''
    digest: "sha256:a39455f913ea4f7355426b48613cc0479c7e549d099bdba520fd4fb563564f48"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9105
  replicas: 1

kafka:
  enabled: true
  image:
    repository: ghcr.io/abelisboa/trisla-kafka
    tag: ''
    digest: "sha256:8291bed273105a3fc88df5f89096abf6a654dc92b0937245dcef85011f3fc5e6"
    pullPolicy: IfNotPresent
  replicas: 1

otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector
    tag: 0.92.0

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.49.1

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: 10.2.3
  adminPassword: admin

production:
  enabled: true
  simulationMode: false
  useRealServices: true
  executeRealActions: true

imagePullSecrets: []
