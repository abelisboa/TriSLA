apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trisla.name" . }}-bc-nssmf
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "trisla.labels" (dict "Values" .Values "Release" .Release "Chart" .Chart "component" "bc-nssmf") | nindent 4 }}

spec:
  replicas: {{ .Values.bcNssmf.replicaCount | default 1 }}

  selector:
    matchLabels:
      app: trisla-bc-nssmf
      app.kubernetes.io/name: {{ include "trisla.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app: trisla-bc-nssmf
        app.kubernetes.io/name: {{ include "trisla.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}

    spec:
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}

      nodeSelector:
        kubernetes.io/hostname: node1

      containers:
      - name: bc-nssmf
        image: {{ include "trisla.image" (dict "Values" .Values "image" .Values.bcNssmf.image) }}
        imagePullPolicy: {{ .Values.bcNssmf.image.pullPolicy | default "Always" }}

        ports:
        - containerPort: {{ .Values.bcNssmf.service.port }}
          name: http

        env:
        - name: TRISLA_NODE_INTERFACE
          value: {{ .Values.network.interface | quote }}

        - name: TRISLA_NODE_IP
          value: {{ .Values.network.nodeIP | quote }}

        - name: OTLP_ENDPOINT
          value: "http://{{ include "trisla.name" . }}-otel-collector:4317"

        {{- if .Values.besu.enabled }}

        - name: BC_ENABLED
          value: "true"

        - name: BC_RPC_URL
          value: "http://{{ include "trisla.name" . }}-besu.{{ .Values.global.namespace }}.svc.cluster.local:8545"

        - name: TRISLA_RPC_URL
          value: "http://{{ include "trisla.name" . }}-besu.{{ .Values.global.namespace }}.svc.cluster.local:8545"

        - name: BESU_RPC_URL
          value: "http://{{ include "trisla.name" . }}-besu.{{ .Values.global.namespace }}.svc.cluster.local:8545"

        - name: TRISLA_CHAIN_ID
          value: "1337"

        {{- else }}

        - name: BC_ENABLED
          value: "false"

        {{- end }}

        # Wallet (Secret)
        - name: BC_PRIVATE_KEY_PATH
          value: "/secrets/bc/privateKey"

        - name: BC_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: bc-nssmf-wallet
              key: privateKey

        # Contract SSOT
        - name: CONTRACT_ADDRESS_PATH
          value: "/app/src/contracts/contract_address.json"

        # Variáveis customizadas (sem permitir sobrescrever BC_ENABLED)
        {{- if .Values.bcNssmf.env }}
        {{- range $key, $value := .Values.bcNssmf.env }}
        {{- if ne $key "BC_ENABLED" }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        {{- end }}

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5

        resources:
          {{- toYaml .Values.bcNssmf.resources | nindent 10 }}

        volumeMounts:
        - name: bc-wallet
          mountPath: /secrets/bc
          readOnly: true

        - name: bc-contract
          mountPath: /app/src/contracts
          readOnly: true

      volumes:
      - name: bc-wallet
        secret:
          secretName: bc-nssmf-wallet

      - name: bc-contract
        configMap:
          name: trisla-bc-contract-address
