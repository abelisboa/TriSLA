{{- if .Values.trafficExporter.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trisla.name" . }}-traffic-exporter
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "trisla.labels" (dict "Values" .Values "Release" .Release "Chart" .Chart "component" "traffic-exporter") | nindent 4 }}
    app.kubernetes.io/name: traffic-exporter
spec:
  replicas: {{ .Values.trafficExporter.replicas | default 1 }}
  selector:
    matchLabels:
      app: trisla-traffic-exporter
      app.kubernetes.io/name: traffic-exporter
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: trisla-traffic-exporter
        app.kubernetes.io/name: traffic-exporter
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      containers:
      - name: exporter
        image: {{ include "trisla.image" (dict "Values" .Values "image" .Values.trafficExporter.image) }}
        imagePullPolicy: {{ .Values.trafficExporter.image.pullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: {{ .Values.trafficExporter.service.port }}
          name: metrics
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.trafficExporter.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trisla.name" . }}-traffic-exporter
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "trisla.labels" (dict "Values" .Values "Release" .Release "Chart" .Chart "component" "traffic-exporter") | nindent 4 }}
    app.kubernetes.io/name: traffic-exporter
spec:
  type: {{ .Values.trafficExporter.service.type }}
  ports:
  - port: {{ .Values.trafficExporter.service.port }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app: trisla-traffic-exporter
    app.kubernetes.io/name: traffic-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
