apiVersion: v1
kind: Service
metadata:
  name: {{ include "trisla.fullname" . }}
  labels:
    app: {{ include "trisla.name" . }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ default "NodePort" .Values.service.type }}
  selector:
    app: {{ include "trisla.name" . }}
  ports:
    # ===========================
    # Backend (FastAPI)
    # ===========================
    - name: backend
      protocol: TCP
      port: {{ default 8000 (index .Values.service.ports 0).port }}
      targetPort: {{ default 8000 (index .Values.service.ports 0).targetPort }}
      nodePort: {{ default 30800 (index .Values.service.ports 0).nodePort }}

    # ===========================
    # Frontend (UI/Nginx)
    # ===========================
    - name: frontend
      protocol: TCP
      port: {{ default 5173 (index .Values.service.ports 1).port }}
      targetPort: {{ default 80 (index .Values.service.ports 1).targetPort }}
      nodePort: {{ default 30173 (index .Values.service.ports 1).nodePort }}
