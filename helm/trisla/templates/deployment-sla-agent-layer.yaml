apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trisla.name" . }}-sla-agent-layer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "trisla.labels" (dict "Values" .Values "Release" .Release "Chart" .Chart "component" "sla-agent-layer") | nindent 4 }}
spec:
  replicas: {{ .Values.slaAgentLayer.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: trisla-sla-agent-layer
      app.kubernetes.io/name: {{ include "trisla.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: trisla-sla-agent-layer
        app.kubernetes.io/name: {{ include "trisla.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}

    spec:
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      nodeSelector:
        kubernetes.io/hostname: node1
      containers:
      - name: sla-agent-layer
        image: {{ include "trisla.image" (dict "Values" .Values "image" .Values.slaAgentLayer.image) }}
        ports:
        - containerPort: {{ .Values.slaAgentLayer.service.port }}
          name: http
        env:
        - name: TRISLA_NODE_INTERFACE
          value: {{ .Values.network.interface | quote }}
        - name: TRISLA_NODE_IP
          value: {{ .Values.network.nodeIP | quote }}
        - name: OTLP_ENDPOINT
          value: "http://{{ include "trisla.name" . }}-otel-collector:4317"
        - name: NASP_ADAPTER_URL
          value: "http://{{ include "trisla.name" . }}-nasp-adapter:{{ .Values.naspAdapter.service.port }}"
        - name: BC_NSSMF_URL
          value: "http://{{ include "trisla.name" . }}-bc-nssmf:{{ .Values.bcNssmf.service.port }}"
        - name: KAFKA_ENABLED
          value: {{ .Values.slaAgentLayer.env.KAFKA_ENABLED | default "false" | quote }}
        - name: KAFKA_BROKERS
          value: {{ .Values.slaAgentLayer.env.KAFKA_BROKERS | default "" | quote }}
        - name: CLOSED_LOOP_ACTUATION_AUDIT_ENABLED
          value: {{ .Values.slaAgentLayer.env.CLOSED_LOOP_ACTUATION_AUDIT_ENABLED | default "false" | quote }}
        - name: CLOSED_LOOP_ACTUATION_ENABLED
          value: {{ .Values.slaAgentLayer.env.CLOSED_LOOP_ACTUATION_ENABLED | default "false" | quote }}
        - name: ACTUATION_AUDIT_STORE_PATH
          value: {{ .Values.slaAgentLayer.env.ACTUATION_AUDIT_STORE_PATH | default "/tmp/trisla_actuation_audit" | quote }}
        - name: ACTUATION_REQUEST_TTL_SECONDS
          value: {{ .Values.slaAgentLayer.env.ACTUATION_REQUEST_TTL_SECONDS | default "300" | quote }}
        - name: ACTUATION_AUTHORIZATION_TIMEOUT_SECONDS
          value: {{ .Values.slaAgentLayer.env.ACTUATION_AUTHORIZATION_TIMEOUT_SECONDS | default "300" | quote }}
        - name: ACTUATION_EXECUTION_TIMEOUT_SECONDS
          value: {{ .Values.slaAgentLayer.env.ACTUATION_EXECUTION_TIMEOUT_SECONDS | default "120" | quote }}
        - name: CLOSED_LOOP_TRANSPORT_DRYRUN_ENABLED
          value: {{ .Values.slaAgentLayer.env.CLOSED_LOOP_TRANSPORT_DRYRUN_ENABLED | default "true" | quote }}
        - name: TN002_LIVE_ENABLED
          value: {{ .Values.slaAgentLayer.env.TN002_LIVE_ENABLED | default "false" | quote }}
        - name: TN002_LIVE_DRYRUN_FALLBACK
          value: {{ .Values.slaAgentLayer.env.TN002_LIVE_DRYRUN_FALLBACK | default "true" | quote }}
        - name: TN002_FAILED_INTENT_CLEANUP_ENABLED
          value: {{ .Values.slaAgentLayer.env.TN002_FAILED_INTENT_CLEANUP_ENABLED | default "false" | quote }}
        - name: ONOS_REST_URL
          value: {{ .Values.slaAgentLayer.env.ONOS_REST_URL | default "http://onos.nasp-transport.svc.cluster.local:8181" | quote }}
        - name: ONOS_REST_AUTH
          value: {{ .Values.slaAgentLayer.env.ONOS_REST_AUTH | default "onos:rocks" | quote }}
        - name: ADMISSION_THROTTLE_STORE_PATH
          value: {{ .Values.slaAgentLayer.env.ADMISSION_THROTTLE_STORE_PATH | default "/tmp/trisla_admission_throttle" | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.slaAgentLayer.resources | nindent 10 }}































