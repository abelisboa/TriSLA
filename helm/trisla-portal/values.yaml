replicaCount: 1

backend:
  image: ghcr.io/abelisboa/trisla-api:latest
  pullPolicy: IfNotPresent
  containerPort: 8000
  service:
    port: 8000
  env:
    SEMANTIC_URL: "http://trisla-semantic.trisla.svc.cluster.local:8081"
    AI_URL: "http://trisla-ai.trisla.svc.cluster.local:8080"
    BLOCKCHAIN_URL: "http://trisla-blockchain.trisla.svc.cluster.local:8051"
    MONITORING_URL: "http://trisla-monitoring.trisla.svc.cluster.local:8090"
    TRISLA_MODE: "auto"
    PROM_URL: "http://nasp-prometheus.monitoring.svc.cluster.local:9090/api/v1/query"

frontend:
  image: ghcr.io/abelisboa/trisla-ui:latest
  pullPolicy: IfNotPresent
  containerPort: 80
  service:
    port: 5173

service:
  type: NodePort
  ports:
    backend: 30800
    frontend: 30173

nodeSelector:
  kubernetes.io/hostname: node1

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "0.5"
    memory: "512Mi"

# Usar imagePullSecrets se o GHCR estiver privado
imagePullSecrets:
  - name: ghcr-creds
