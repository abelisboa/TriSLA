apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trisla-portal.fullname" . }}
  labels:
    app: {{ include "trisla-portal.name" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "trisla-portal.name" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: {{ include "trisla-portal.name" . }}
    spec:
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}

      containers:
        # Backend (FastAPI)
        - name: trisla-backend
          image: "{{ .Values.backend.image }}"
          imagePullPolicy: {{ .Values.backend.pullPolicy | default "IfNotPresent" }}
          command: ["uvicorn"]
          args: ["apps.api.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.backend.containerPort | default 8000 }}"]
          ports:
            - containerPort: {{ .Values.backend.containerPort | default 8000 }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.backend.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.backend.containerPort | default 8000 }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.backend.containerPort | default 8000 }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 4
          resources:
{{ toYaml .Values.resources | indent 12 }}

        # Frontend (Nginx)
        - name: trisla-frontend
          image: "{{ .Values.frontend.image }}"
          imagePullPolicy: {{ .Values.frontend.pullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh","-c"]
          args: ["nginx -g 'daemon off;'"]
          ports:
            - containerPort: {{ .Values.frontend.containerPort | default 80 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.containerPort | default 80 }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.containerPort | default 80 }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 4
          resources:
{{ toYaml .Values.resources | indent 12 }}

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst

      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
{{ toYaml .Values.affinity | indent 8 }}
      {{- end }}
