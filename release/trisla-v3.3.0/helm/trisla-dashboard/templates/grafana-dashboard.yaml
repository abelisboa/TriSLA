apiVersion: v1
kind: ConfigMap
metadata:
  name: trisla-grafana-dashboard
  labels:
    grafana_dashboard: "1"
data:
  trisla-dashboard.json: |
    {
      "uid": "trisla-dashboard",
      "title": "TriSLA Dashboard v3.2.4",
      "refresh": "10s",
      "tags": ["TriSLA","NASP","Monitoring"],
      "schemaVersion": 36,
      "version": 1,
      "panels": [
        {"type": "stat","title": "Prometheus","targets":[{"expr":"up{job='prometheus'}"}]},
        {"type": "stat","title": "SEM-NSMF","targets":[{"expr":"up{job='sem-nsmf'}"}]},
        {"type": "timeseries","title": "CPU Usage","targets":[{"expr":"process_cpu_seconds_total"}]},
        {"type": "timeseries","title": "Memory Usage","targets":[{"expr":"process_resident_memory_bytes"}]}
      ]
    }


