apiVersion: apps/v1
kind: Deployment
metadata:
  name: sla-agents
  labels:
    app.kubernetes.io/name: sla-agents
    app.kubernetes.io/instance: sla-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sla-agents
      app.kubernetes.io/instance: sla-agents
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sla-agents
        app.kubernetes.io/instance: sla-agents
    spec:
      containers:
        - name: sla-agents
          image: "ghcr.io/abelisboa/trisla-sla-agents:1.0.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
