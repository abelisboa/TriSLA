---
- name: Install Docker and dependencies
  package:
    name:
      - docker.io
      - docker-compose
      - python3-pip
    state: present

- name: Start and enable Docker service
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Install Python Docker SDK
  pip:
    name: docker
    state: present

- name: Create TriSLA network directory
  file:
    path: /opt/trisla-fabric
    state: directory
    mode: '0755'

- name: Copy Fabric network configuration
  copy:
    src: "{{ playbook_dir }}/../fabric-network/"
    dest: /opt/trisla-fabric/
    mode: '0755'

- name: Start Fabric network
  shell: |
    cd /opt/trisla-fabric
    ./scripts/start.sh
  async: 300
  poll: 10

- name: Deploy TriSLA applications
  docker_container:
    name: "{{ item.name }}"
    image: "{{ item.image }}"
    ports:
      - "{{ item.port }}:{{ item.port }}"
    state: started
    restart_policy: always
  loop:
    - { name: "trisla-semantic", image: "{{ trisla_semantic_image }}", port: "{{ network_ports.semantic }}" }
    - { name: "trisla-ai", image: "{{ trisla_ai_image }}", port: "{{ network_ports.ai }}" }
    - { name: "trisla-blockchain", image: "{{ trisla_blockchain_image }}", port: "{{ network_ports.blockchain }}" }
    - { name: "trisla-monitoring", image: "{{ trisla_monitoring_image }}", port: "{{ network_ports.monitoring }}" }
