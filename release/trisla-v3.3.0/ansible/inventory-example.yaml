# TriSLA Portal - Ansible Inventory Example
# Copy this file to inventory.yaml and customize for your environment

all:
  children:
    k8s_cluster:
      hosts:
        # Substitua pelos IPs e usuários dos seus nodes
        node1:
          ansible_host: 192.168.1.10
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          # Configurações específicas do node
          node_role: master
          node_labels:
            - "node-role.kubernetes.io/master"
            - "node-role.kubernetes.io/control-plane"
        node2:
          ansible_host: 192.168.1.11
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          node_role: worker
          node_labels:
            - "node-role.kubernetes.io/worker"
        node3:
          ansible_host: 192.168.1.12
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          node_role: worker
          node_labels:
            - "node-role.kubernetes.io/worker"
      vars:
        # Configurações globais do cluster
        k8s_version: "1.28.0"
        container_runtime: "containerd"
        cni_plugin: "calico"
        # Configurações de rede
        pod_network_cidr: "10.244.0.0/16"
        service_cidr: "10.96.0.0/12"
        # Configurações de recursos
        master_memory: "2G"
        master_cpu: "2"
        worker_memory: "4G"
        worker_cpu: "4"
        # Configurações de armazenamento
        storage_class: "local-path"
        # Configurações de monitoramento
        prometheus_enabled: true
        grafana_enabled: true
        # Configurações de segurança
        enable_rbac: true
        enable_network_policies: true
        # Configurações de logging
        log_level: "info"
        audit_log_enabled: true
