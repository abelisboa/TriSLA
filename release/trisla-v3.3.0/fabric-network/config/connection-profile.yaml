name: "trisla-network"
version: "1.0.0"
client:
  organization: Org1
  connection:
    timeout:
      peer:
        endorser: "300"
organizations:
  Org1:
    mspid: Org1MSP
    peers:
      - peer0.org1.example.com
    certificateAuthorities:
      - ca.org1.example.com
peers:
  peer0.org1.example.com:
    url: grpc://peer0.org1.example.com:7051
    eventUrl: grpc://peer0.org1.example.com:7053
certificateAuthorities:
  ca.org1.example.com:
    url: https://ca.org1.example.com:7054
    caName: ca.org1.example.com
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        MIICGTCCAcCgAwIBAgIRAM... (truncated for brevity)
        -----END CERTIFICATE-----
    httpOptions:
      verify: false
orderers:
  orderer.example.com:
    url: grpc://orderer.example.com:7050
    tlsCACerts:
      pem: |
        -----BEGIN CERTIFICATE-----
        MIICGTCCAcCgAwIBAgIRAM... (truncated for brevity)
        -----END CERTIFICATE-----
channels:
  trisla-channel:
    orderers:
      - orderer.example.com
    peers:
      peer0.org1.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
        eventSource: true
