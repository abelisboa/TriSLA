# ===============================================================
# Service interno de observabilidade TriSLA@NASP
# Referência: Cap. 6–7 e Apêndice H — Observabilidade e Métricas
# ===============================================================
apiVersion: v1
kind: Service
metadata:
  name: trisla-portal-observability
  namespace: trisla
  labels:
    app: trisla-portal
spec:
  type: ClusterIP
  selector:
    app: trisla-portal
  ports:
    - name: http
      port: 8000
      targetPort: 8000
