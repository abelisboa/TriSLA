---
# Deploy Local do TriSLA no Node1
# Este playbook executa localmente no Node1

- name: Deploy TriSLA Portal Local
  hosts: localhost
  become: yes
  gather_facts: yes
  vars:
    trisla_version: "1.0.0"
    trisla_home: "/home/porvir5g/gtp5g/trisla-portal"
    k8s_namespace: "trisla"
    monitoring_namespace: "monitoring"
    
  tasks:
    - name: "🔍 PASSO 1: Verificar informações do sistema"
      debug:
        msg: |
          ==========================================
          🖥️  INFORMAÇÕES DO NODE1
          ==========================================
          Hostname: {{ ansible_hostname }}
          IP: {{ ansible_default_ipv4.address }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Arquitetura: {{ ansible_architecture }}
          Memória: {{ ansible_memtotal_mb }}MB
          CPU: {{ ansible_processor_vcpus }} cores
          ==========================================
      
    - name: "🔄 PASSO 2: Atualizar sistema"
      apt:
        update_cache: yes
        upgrade: yes
        autoremove: yes
      register: update_result
      
    - name: "📦 Exibir pacotes atualizados"
      debug:
        msg: "Sistema atualizado: {{ update_result.changed }}"
      
    - name: "📦 PASSO 3: Instalar dependências do sistema"
      apt:
        name:
          - git
          - curl
          - wget
          - unzip
          - python3
          - python3-pip
          - python3-venv
          - docker.io
          - kubectl
          - jq
          - htop
          - tree
          - helm
        state: present
        update_cache: yes
      register: install_result
      
    - name: "📋 Exibir pacotes instalados"
      debug:
        msg: "Dependências instaladas: {{ install_result.changed }}"
      
    - name: "🐳 PASSO 4: Configurar Docker"
      systemd:
        name: docker
        state: started
        enabled: yes
      register: docker_start
      
    - name: "👤 Adicionar usuário ao grupo docker"
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      register: user_group
      
    - name: "✅ Verificar Docker"
      command: docker --version
      register: docker_version
      
    - name: "📊 Exibir versão do Docker"
      debug:
        msg: "Docker versão: {{ docker_version.stdout }}"
      
    - name: "📁 PASSO 5: Verificar diretório do TriSLA"
      stat:
        path: "{{ trisla_home }}"
      register: trisla_dir
      
    - name: "📂 Criar diretório se não existir"
      file:
        path: "{{ trisla_home }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      when: not trisla_dir.stat.exists
      
    - name: "🔄 PASSO 6: Atualizar repositório TriSLA"
      git:
        repo: "https://github.com/abelisboa/TriSLA-Portal.git"
        dest: "{{ trisla_home }}"
        version: main
        force: yes
        update: yes
      register: git_result
      
    - name: "📊 Exibir status do Git"
      debug:
        msg: "Git atualizado: {{ git_result.changed }}"
      
    - name: "🐍 PASSO 7: Instalar dependências Python"
      pip:
        requirements: "{{ trisla_home }}/requirements.txt"
        state: present
      register: pip_result
      
    - name: "📊 Exibir dependências Python instaladas"
      debug:
        msg: "Dependências Python: {{ pip_result.changed }}"
      
    - name: "⚙️ PASSO 8: Configurar variáveis de ambiente"
      copy:
        content: |
          TRISLA_VERSION={{ trisla_version }}
          NASP_ENDPOINT=http://{{ ansible_default_ipv4.address }}:8080
          K8S_NAMESPACE={{ k8s_namespace }}
          MONITORING_NAMESPACE={{ monitoring_namespace }}
          LOG_LEVEL=INFO
          PYTHONPATH={{ trisla_home }}
        dest: "{{ trisla_home }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'
      register: env_result
      
    - name: "📊 Exibir configuração de ambiente"
      debug:
        msg: "Variáveis de ambiente configuradas: {{ env_result.changed }}"
      
    - name: "🔧 PASSO 9: Verificar kubectl"
      command: kubectl version --client
      register: kubectl_version
      ignore_errors: yes
      
    - name: "📊 Exibir versão do kubectl"
      debug:
        msg: "kubectl versão: {{ kubectl_version.stdout }}"
      when: kubectl_version.rc == 0
      
    - name: "📁 PASSO 10: Criar namespaces Kubernetes"
      kubernetes.core.k8s:
        name: "{{ item }}"
        api_version: v1
        kind: Namespace
        state: present
      loop:
        - "{{ k8s_namespace }}"
        - "{{ monitoring_namespace }}"
      register: namespace_result
      
    - name: "📊 Exibir namespaces criados"
      debug:
        msg: "Namespaces criados: {{ namespace_result.results | map(attribute='changed') | list }}"
      
    - name: "🚀 PASSO 11: Deployar NWDAF"
      kubernetes.core.helm:
        name: nwdaf
        chart_ref: "{{ trisla_home }}/helm/nwdaf"
        release_namespace: "{{ k8s_namespace }}"
        values:
          image.repository: "ghcr.io/abelisboa/trisla-nwdaf"
          image.tag: "{{ trisla_version }}"
        state: present
        wait: yes
        timeout: 300s
      register: nwdaf_result
      
    - name: "📊 Exibir status do NWDAF"
      debug:
        msg: "NWDAF deployado: {{ nwdaf_result.changed }}"
      
    - name: "🚀 PASSO 12: Deployar Decision Engine"
      kubernetes.core.helm:
        name: decision-engine
        chart_ref: "{{ trisla_home }}/helm/decision-engine"
        release_namespace: "{{ k8s_namespace }}"
        values:
          image.repository: "ghcr.io/abelisboa/trisla-decision-engine"
          image.tag: "{{ trisla_version }}"
        state: present
        wait: yes
        timeout: 300s
      register: decision_result
      
    - name: "📊 Exibir status do Decision Engine"
      debug:
        msg: "Decision Engine deployado: {{ decision_result.changed }}"
      
    - name: "🚀 PASSO 13: Deployar SLA Agents"
      kubernetes.core.helm:
        name: sla-agents
        chart_ref: "{{ trisla_home }}/helm/sla-agents"
        release_namespace: "{{ k8s_namespace }}"
        values:
          image.repository: "ghcr.io/abelisboa/trisla-sla-agents"
          image.tag: "{{ trisla_version }}"
        state: present
        wait: yes
        timeout: 300s
      register: sla_result
      
    - name: "📊 Exibir status do SLA Agents"
      debug:
        msg: "SLA Agents deployados: {{ sla_result.changed }}"
      
    - name: "🚀 PASSO 14: Deployar Dashboard"
      kubernetes.core.helm:
        name: dashboard
        chart_ref: "{{ trisla_home }}/helm/dashboard"
        release_namespace: "{{ k8s_namespace }}"
        values:
          image.repository: "ghcr.io/abelisboa/trisla-dashboard"
          image.tag: "{{ trisla_version }}"
        state: present
        wait: yes
        timeout: 300s
      register: dashboard_result
      
    - name: "📊 Exibir status do Dashboard"
      debug:
        msg: "Dashboard deployado: {{ dashboard_result.changed }}"
      
    - name: "🚀 PASSO 15: Deployar Prometheus"
      kubernetes.core.helm:
        name: prometheus
        chart_ref: prometheus-community/kube-prometheus-stack
        release_namespace: "{{ monitoring_namespace }}"
        values:
          prometheus:
            prometheusSpec:
              retention: 30d
          grafana:
            adminPassword: "trisla123"
        state: present
        wait: yes
        timeout: 600s
      register: prometheus_result
      
    - name: "📊 Exibir status do Prometheus"
      debug:
        msg: "Prometheus deployado: {{ prometheus_result.changed }}"
      
    - name: "🚀 PASSO 16: Deployar Grafana"
      kubernetes.core.helm:
        name: grafana
        chart_ref: grafana/grafana
        release_namespace: "{{ monitoring_namespace }}"
        values:
          adminPassword: "trisla123"
          service:
            type: NodePort
            nodePort: 30000
        state: present
        wait: yes
        timeout: 300s
      register: grafana_result
      
    - name: "📊 Exibir status do Grafana"
      debug:
        msg: "Grafana deployado: {{ grafana_result.changed }}"
      
    - name: "🔗 PASSO 17: Configurar port-forward"
      shell: |
        nohup kubectl port-forward svc/dashboard 8080:80 -n {{ k8s_namespace }} > /dev/null 2>&1 &
        nohup kubectl port-forward svc/grafana 3000:80 -n {{ monitoring_namespace }} > /dev/null 2>&1 &
        nohup kubectl port-forward svc/prometheus 9090:80 -n {{ monitoring_namespace }} > /dev/null 2>&1 &
      register: portforward_result
      
    - name: "📊 Exibir status do port-forward"
      debug:
        msg: "Port-forward configurado: {{ portforward_result.changed }}"
      
    - name: "📊 PASSO 18: Verificar status dos pods"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ k8s_namespace }}"
      register: trisla_pods
      
    - name: "📊 Exibir pods do TriSLA"
      debug:
        msg: |
          ==========================================
          📊 PODS DO TRISLA
          ==========================================
          {% for pod in trisla_pods.resources %}
          Pod: {{ pod.metadata.name }}
          Status: {{ pod.status.phase }}
          Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
          {% endfor %}
          ==========================================
      
    - name: "📊 Verificar pods de monitoramento"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ monitoring_namespace }}"
      register: monitoring_pods
      
    - name: "📊 Exibir pods de monitoramento"
      debug:
        msg: |
          ==========================================
          📊 PODS DE MONITORAMENTO
          ==========================================
          {% for pod in monitoring_pods.resources %}
          Pod: {{ pod.metadata.name }}
          Status: {{ pod.status.phase }}
          Ready: {{ pod.status.containerStatuses[0].ready if pod.status.containerStatuses else 'N/A' }}
          {% endfor %}
          ==========================================
      
    - name: "🧪 PASSO 19: Testar conectividade"
      uri:
        url: "http://localhost:8080/health"
        method: GET
        timeout: 10
      register: dashboard_test
      ignore_errors: yes
      
    - name: "📊 Exibir teste do Dashboard"
      debug:
        msg: "Dashboard teste: {{ 'SUCESSO' if dashboard_test.status == 200 else 'FALHA' }}"
      
    - name: "🧪 Testar Grafana"
      uri:
        url: "http://localhost:3000/api/health"
        method: GET
        timeout: 10
      register: grafana_test
      ignore_errors: yes
      
    - name: "📊 Exibir teste do Grafana"
      debug:
        msg: "Grafana teste: {{ 'SUCESSO' if grafana_test.status == 200 else 'FALHA' }}"
      
    - name: "🧪 Testar Prometheus"
      uri:
        url: "http://localhost:9090/-/healthy"
        method: GET
        timeout: 10
      register: prometheus_test
      ignore_errors: yes
      
    - name: "📊 Exibir teste do Prometheus"
      debug:
        msg: "Prometheus teste: {{ 'SUCESSO' if prometheus_test.status == 200 else 'FALHA' }}"
      
    - name: "🎉 PASSO 20: Resumo final"
      debug:
        msg: |
          ==========================================
          �� DEPLOY DO TRISLA CONCLUÍDO!
          ==========================================
          
          📊 Serviços Deployados:
          ✅ NWDAF (Network Data Analytics Function)
          ✅ Decision Engine
          ✅ SLA Agents
          ✅ Dashboard
          ✅ Prometheus (Monitoramento)
          ✅ Grafana (Dashboards)
          
          🌐 Endpoints Disponíveis:
          ✅ Dashboard: http://{{ ansible_default_ipv4.address }}:8080
          ✅ Grafana: http://{{ ansible_default_ipv4.address }}:3000 (admin/trisla123)
          ✅ Prometheus: http://{{ ansible_default_ipv4.address }}:9090
          
          📋 Próximos Passos:
          1. Acessar dashboard em http://{{ ansible_default_ipv4.address }}:8080
          2. Configurar slices de rede
          3. Testar integração com NASP
          4. Monitorar métricas em tempo real
          
          ==========================================
EOF# Criar playbook local
