apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sla-agent-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: trisla-sla-agent-layer
  namespaceSelector:
    matchNames:
      - trisla
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
