apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: decision-engine-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: trisla-decision-engine
  namespaceSelector:
    matchNames:
      - trisla
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
