contract_version: TRANSPORT_CONTRACT_SSOT_V1
onos:
  namespace: nasp-transport
  pod_label: app=onos
  rest_url_env: ONOS_REST_URL
  rest_url: http://onos.nasp-transport.svc.cluster.local:8181
  auth_env: ONOS_REST_AUTH
  rest_timeout_seconds: 10
  endpoints:
    - /onos/v1/applications
    - /onos/v1/devices
    - /onos/v1/links
    - /onos/v1/hosts
    - /onos/v1/flows
    - /onos/v1/intents
lab:
  transport_ref: onos.nasp-transport.svc.cluster.local:8181
  onos_version: "2.7.0"
  lab_topology_empty: true
  known_failed_intent_id: "0x288"
freshness:
  observation_window_seconds: 300
  stale_threshold_seconds: 600
correlation:
  orchestration_nsi_ids: ["11", "12", "13"]
  allow_context_split: true
  join_keys:
    - supi
    - session_id
    - dnn
fallback:
  never_block_instantiate: true
feature_flags:
  transport_env: TRANSPORT_BINDING_ENABLED
