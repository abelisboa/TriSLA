# PROMPT_SNASP_13 — Exposição Free5GC WebUI via Service NodePort (SSOT)
# Selector ajustado conforme FASE 1: app.kubernetes.io/name=free5gc-webui
---
apiVersion: v1
kind: Service
metadata:
  name: webui-free5gc-nodeport
  namespace: ns-1274485
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: free5gc-webui
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 32500
