# PROMPT_SNASP_12D — UERANSIM single-pod (gNB + UE) para Registration e PDU Session
# Radio link: 127.0.0.1 (same pod). AMF: amf-free5gc-amf-amf-0.amf-service.ns-1274485.svc.cluster.local:38412
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ueransim-singlepod-config
  namespace: ueransim
data:
  gnb.yaml: |
    mcc: '208'
    mnc: '93'
    nci: '0x000000010'
    idLength: 32
    tac: 1
    linkIp: 127.0.0.1
    ngapIp: 0.0.0.0
    gtpIp: 127.0.0.1
    amfConfigs:
      - address: amf-free5gc-amf-amf-0.amf-service.ns-1274485.svc.cluster.local
        port: 38412
    slices:
      - sst: 0x1
        sd: 0x010203
    ignoreStreamIds: true
  ue.yaml: |
    supi: 'imsi-208930000000001'
    mcc: '208'
    mnc: '93'
    protectionScheme: 0
    key: '8baf473f2f8fd09487cccbd7097c6862'
    op: '8e27b6af0e692e750f32667a3b14605d'
    opType: 'OPC'
    amf: '8000'
    tunNetmask: '255.255.255.0'
    gnbSearchList:
      - 127.0.0.1
    uacAic:
      mps: false
      mcs: false
    uacAcc:
      normalClass: 0
      class11: false
      class12: false
      class13: false
      class14: false
      class15: false
    sessions:
      - type: 'IPv4'
        apn: 'internet'
        slice:
          sst: 0x01
          sd: 0x010203
    configured-nssai:
      - sst: 0x01
        sd: 0x010203
    default-nssai:
      - sst: 1
        sd: 1
    integrity:
      IA1: true
      IA2: true
      IA3: true
    ciphering:
      EA1: true
      EA2: true
      EA3: true
    integrityMaxRate:
      uplink: 'full'
      downlink: 'full'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ueransim-singlepod
  namespace: ueransim
  labels:
    app: ueransim-singlepod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ueransim-singlepod
  template:
    metadata:
      labels:
        app: ueransim-singlepod
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: gnb
          image: ghcr.io/abelisboa/ueransim:latest
          command: ["nr-gnb", "-c", "/config/gnb.yaml"]
          volumeMounts:
            - name: config
              mountPath: /config
        - name: ue
          image: ghcr.io/abelisboa/ueransim:latest
          command: ["nr-ue", "-c", "/config/ue.yaml"]
          volumeMounts:
            - name: config
              mountPath: /config
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
      volumes:
        - name: config
          configMap:
            name: ueransim-singlepod-config
