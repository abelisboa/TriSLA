# PROMPT_SNASP_12A — UERANSIM gNB para Free5GC (ns-1274485)
# N2: amf-service.ns-1274485.svc.cluster.local:8805 (UDP)
# Slice URLLC: SST 1, SD 010203 (02_slice_definition.yaml)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ueransim-gnb-config
  namespace: ueransim
data:
  gnb.yaml: |
    mcc: '208'
    mnc: '93'
    nci: '0x000000010'
    idLength: 32
    tac: 1
    linkIp: 0.0.0.0
    ngapIp: 0.0.0.0
    gtpIp: 0.0.0.0
    amfConfigs:
      - address: amf-free5gc-amf-amf-0.amf-service.ns-1274485.svc.cluster.local
        port: 38412
    slices:
      - sst: 0x1
        sd: 0x010203
    ignoreStreamIds: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ueransim-gnb
  namespace: ueransim
  labels:
    app: ueransim-gnb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ueransim-gnb
  template:
    metadata:
      labels:
        app: ueransim-gnb
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: gnb
          image: ghcr.io/abelisboa/ueransim:latest
          command: ["nr-gnb", "-c", "/etc/ueransim/gnb.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/ueransim
      volumes:
        - name: config
          configMap:
            name: ueransim-gnb-config
---
apiVersion: v1
kind: Service
metadata:
  name: ueransim-gnb
  namespace: ueransim
spec:
  selector:
    app: ueransim-gnb
  ports:
    - name: ngap
      port: 8805
      targetPort: 8805
      protocol: UDP
    - name: gtp
      port: 2152
      targetPort: 2152
      protocol: UDP
