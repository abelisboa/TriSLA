# OpenTelemetry Collector Configuration
# Configuração centralizada para coleta de traces, metrics e logs

apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: trisla-nsp
data:
  otel-collector-config.yaml: |
    receivers:
      # Receivers para traces
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      
      # Receivers para métricas
      prometheus:
        config:
          scrape_configs:
            - job_name: 'trisla-api'
              static_configs:
                - targets: ['trisla-api:8080']
              metrics_path: /metrics
              scrape_interval: 30s
            - job_name: 'decision-engine'
              static_configs:
                - targets: ['decision-engine:8080']
              metrics_path: /metrics
              scrape_interval: 30s
            - job_name: 'sla-agents'
              static_configs:
                - targets: ['sla-agents:8080']
              metrics_path: /metrics
              scrape_interval: 30s
      
      # Receivers para logs
      filelog:
        include: ['/var/log/pods/*/*/*.log']
        start_at: beginning
        operators:
          - type: json_parser
            id: parser-docker
            output: extract_metadata_from_filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%fZ'
          - type: regex_parser
            id: extract_metadata_from_filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<container_name>[^_]+)\.log$'
            parse_from: attributes["log.file.path"]
            output: add_metadata
          - type: move
            id: add_metadata
            from: attributes
            to: resource

    processors:
      # Processors para traces
      batch:
        timeout: 1s
        send_batch_size: 1024
      
      # Processors para métricas
      memory_limiter:
        limit_mib: 512
        spike_limit_mib: 128
        check_interval: 5s
      
      # Processors para logs
      resource:
        attributes:
          - key: service.name
            value: trisla
            action: upsert
          - key: service.version
            value: 1.0.0
            action: upsert
      
      # Processors para atributos
      attributes:
        actions:
          - key: environment
            value: production
            action: upsert
          - key: cluster
            value: trisla-cluster
            action: upsert

    exporters:
      # Exporters para traces
      jaeger:
        endpoint: jaeger:14250
        tls:
          insecure: true
      
      # Exporters para métricas
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: trisla
        const_labels:
          cluster: trisla-cluster
          environment: production
      
      # Exporters para logs
      loki:
        endpoint: http://loki:3100/loki/api/v1/push
        labels:
          attributes:
            service.name: "service_name"
            service.namespace: "service_namespace"
          resource:
            service.name: "service_name"
            service.namespace: "service_namespace"
      
      # Exporters para debugging
      logging:
        loglevel: debug
        sampling_initial: 5
        sampling_thereafter: 200

    service:
      pipelines:
        # Pipeline para traces
        traces:
          receivers: [otlp]
          processors: [batch, memory_limiter, attributes]
          exporters: [jaeger, logging]
        
        # Pipeline para métricas
        metrics:
          receivers: [prometheus, otlp]
          processors: [batch, memory_limiter, attributes]
          exporters: [prometheus, logging]
        
        # Pipeline para logs
        logs:
          receivers: [filelog, otlp]
          processors: [batch, memory_limiter, resource, attributes]
          exporters: [loki, logging]




