groups:
  - name: trisla-slo-rules
    interval: 30s
    rules:
      - record: latency_p99
        expr: histogram_quantile(0.99, sum(rate(trisla_request_duration_bucket[5m])) by (le, interface))
      - alert: TrislaHighLatency
        expr: latency_p99 > 0.25
        for: 2m
        labels:
          severity: warning
          module: "SLO_LATENCY"
        annotations:
          summary: "Interface {{ $labels.interface }} acima do SLO (p99 > 250ms)"
          description: "Latência p99 excedeu o limite definido no Apêndice E."
      - alert: TrislaErrorRateHigh
        expr: (sum(rate(trisla_req_error_total[5m])) by (interface)) / (sum(rate(trisla_req_total[5m])) by (interface)) > 0.01
        for: 2m
        labels:
          severity: critical
          module: "SLO_ERROR"
        annotations:
          summary: "Erro acima do SLO (≥1%)"
          description: "Taxa de erro excedeu o limite permitido de 0.1%."

