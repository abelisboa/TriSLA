---
# Deploy do TriSLA no NASP (node1 e node2)
# Este playbook instala e configura o TriSLA Portal no NASP

- name: Deploy TriSLA Portal no NASP
  hosts: nasp_nodes
  become: yes
  vars:
    trisla_version: "1.0.0"
    trisla_repo: "https://github.com/abelisboa/TriSLA-Portal.git"
    trisla_user: "trisla"
    trisla_home: "/opt/trisla"
    k8s_namespace: "trisla"
    nasp_endpoint: "{{ nasp_api_endpoint | default('http://nasp:8080') }}"
    
  tasks:
    - name: Atualizar sistema
      apt:
        update_cache: yes
        upgrade: yes
      when: ansible_os_family == "Debian"
    
    - name: Instalar dependências
      package:
        name:
          - git
          - curl
          - wget
          - unzip
          - python3
          - python3-pip
          - docker.io
          - kubectl
          - helm
        state: present
    
    - name: Criar usuário trisla
      user:
        name: "{{ trisla_user }}"
        home: "{{ trisla_home }}"
        shell: /bin/bash
        create_home: yes
        state: present
    
    - name: Adicionar usuário trisla ao grupo docker
      user:
        name: "{{ trisla_user }}"
        groups: docker
        append: yes
    
    - name: Iniciar e habilitar Docker
      systemd:
        name: docker
        state: started
        enabled: yes
    
    - name: Configurar kubectl
      blockinfile:
        path: /home/{{ trisla_user }}/.kube/config
        create: yes
        owner: "{{ trisla_user }}"
        group: "{{ trisla_user }}"
        mode: '0600'
        content: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://{{ ansible_default_ipv4.address }}:6443
              insecure-skip-tls-verify: true
            name: nasp-cluster
          contexts:
          - context:
              cluster: nasp-cluster
              user: trisla
            name: trisla-context
          current-context: trisla-context
          users:
          - name: trisla
            user:
              token: "{{ k8s_token | default('your-token-here') }}"
    
    - name: Clonar repositório TriSLA
      git:
        repo: "{{ trisla_repo }}"
        dest: "{{ trisla_home }}/trisla-portal"
        version: main
        force: yes
      become_user: "{{ trisla_user }}"
    
    - name: Instalar dependências Python
      pip:
        requirements: "{{ trisla_home }}/trisla-portal/requirements.txt"
        state: present
      become_user: "{{ trisla_user }}"
    
    - name: Configurar variáveis de ambiente
      template:
        src: trisla.env.j2
        dest: "{{ trisla_home }}/.env"
        owner: "{{ trisla_user }}"
        group: "{{ trisla_user }}"
        mode: '0600'
    
    - name: Criar namespace Kubernetes
      kubernetes.core.k8s:
        name: "{{ k8s_namespace }}"
        api_version: v1
        kind: Namespace
        state: present
      when: k8s_available | default(false)
    
    - name: Instalar Helm charts
      kubernetes.core.helm:
        name: "{{ item.name }}"
        chart_ref: "{{ trisla_home }}/trisla-portal/helm/{{ item.chart }}"
        release_namespace: "{{ k8s_namespace }}"
        values:
          image.repository: "{{ item.image_repo }}"
          image.tag: "{{ trisla_version }}"
          nasp.endpoint: "{{ nasp_endpoint }}"
        state: present
      loop:
        - { name: "nwdaf", chart: "nwdaf", image_repo: "ghcr.io/abelisboa/trisla-nwdaf" }
        - { name: "decision-engine", chart: "decision-engine", image_repo: "ghcr.io/abelisboa/trisla-decision-engine" }
        - { name: "sla-agents", chart: "sla-agents", image_repo: "ghcr.io/abelisboa/trisla-sla-agents" }
        - { name: "dashboard", chart: "dashboard", image_repo: "ghcr.io/abelisboa/trisla-dashboard" }
      when: k8s_available | default(false)
    
    - name: Configurar NASP API
      uri:
        url: "{{ nasp_endpoint }}/api/v1/config"
        method: POST
        body_format: json
        body:
          trisla_endpoint: "http://{{ ansible_default_ipv4.address }}:8080"
          nwdaf_endpoint: "http://nwdaf:8080"
          decision_engine_endpoint: "http://decision-engine:8080"
          sla_agents_endpoint: "http://sla-agents:8080"
        status_code: 200
      ignore_errors: yes
    
    - name: Configurar monitoramento
      block:
        - name: Instalar Prometheus
          kubernetes.core.helm:
            name: prometheus
            chart_ref: prometheus-community/kube-prometheus-stack
            release_namespace: monitoring
            state: present
          when: k8s_available | default(false)
        
        - name: Instalar Grafana
          kubernetes.core.helm:
            name: grafana
            chart_ref: grafana/grafana
            release_namespace: monitoring
            values:
              adminPassword: "trisla123"
            state: present
          when: k8s_available | default(false)
    
    - name: Configurar dashboards
      template:
        src: grafana-dashboards.yml.j2
        dest: "{{ trisla_home }}/grafana-dashboards.yml"
        owner: "{{ trisla_user }}"
        group: "{{ trisla_user }}"
    
    - name: Executar testes de validação
      command: "{{ trisla_home }}/trisla-portal/scripts/validate_trisla.sh"
      become_user: "{{ trisla_user }}"
      ignore_errors: yes
    
    - name: Configurar serviço systemd
      template:
        src: trisla.service.j2
        dest: /etc/systemd/system/trisla.service
        mode: '0644'
      notify: restart trisla
    
    - name: Habilitar e iniciar serviço TriSLA
      systemd:
        name: trisla
        enabled: yes
        state: started
      notify: restart trisla
    
    - name: Verificar status dos serviços
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ k8s_namespace }}"
        label_selectors:
          - app.kubernetes.io/part-of=trisla
      register: trisla_pods
      when: k8s_available | default(false)
    
    - name: Exibir status dos pods
      debug:
        var: trisla_pods.resources
      when: k8s_available | default(false)
    
    - name: Configurar firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "8080"  # Dashboard
        - "9090"  # Prometheus
        - "3000"  # Grafana
        - "6443"  # Kubernetes API
      when: ansible_os_family == "Debian"
    
    - name: Configurar logrotate
      template:
        src: trisla.logrotate.j2
        dest: /etc/logrotate.d/trisla
        mode: '0644'
    
    - name: Criar script de monitoramento
      template:
        src: monitor_trisla.sh.j2
        dest: "{{ trisla_home }}/monitor_trisla.sh"
        owner: "{{ trisla_user }}"
        group: "{{ trisla_user }}"
        mode: '0755'
    
    - name: Configurar cron para monitoramento
      cron:
        name: "Monitor TriSLA"
        job: "{{ trisla_home }}/monitor_trisla.sh"
        minute: "*/5"
        user: "{{ trisla_user }}"
    
    - name: Executar teste final
      command: "{{ trisla_home }}/trisla-portal/scripts/test_trisla_nasp.sh"
      become_user: "{{ trisla_user }}"
      ignore_errors: yes
    
    - name: Exibir informações de acesso
      debug:
        msg: |
          ==========================================
          TriSLA Portal instalado com sucesso!
          ==========================================
          
          Dashboard: http://{{ ansible_default_ipv4.address }}:8080
          Grafana: http://{{ ansible_default_ipv4.address }}:3000 (admin/trisla123)
          Prometheus: http://{{ ansible_default_ipv4.address }}:9090
          
          NASP Endpoint: {{ nasp_endpoint }}
          Namespace: {{ k8s_namespace }}
          
          Para monitorar: {{ trisla_home }}/monitor_trisla.sh
          Logs: journalctl -u trisla -f
          
          ==========================================
  
  handlers:
    - name: restart trisla
      systemd:
        name: trisla
        state: restarted




