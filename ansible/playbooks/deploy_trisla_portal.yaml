---
- name: Implantação automatizada do TriSLA Portal (v3.6-logsafe)
  hosts: localhost
  connection: local
  become: true
  vars:
    namespace: "trisla"
    helm_chart_path: "/home/porvir5g/gtp5g/trisla-portal/helm/trisla-portal"
    values_file: "/home/porvir5g/gtp5g/trisla-portal/docs/config-examples/values-nasp.yaml"
    backend_image: "ghcr.io/abelisboa/trisla-api:latest"
    frontend_image: "ghcr.io/abelisboa/trisla-ui:latest"
    log_dir: "/home/porvir5g/gtp5g/trisla-portal/ansible/logs"
    log_file: "/home/porvir5g/gtp5g/trisla-portal/ansible/logs/trisla_preflight.log"

  pre_tasks:
    - name: Criar diretório de logs, se não existir
      ansible.builtin.file:
        path: "{{ log_dir }}"
        state: directory
        mode: '0755'

    - name: Iniciar log
      ansible.builtin.shell: |
        echo "🚀 Início da implantação TriSLA Portal — $(date '+%Y-%m-%d %H:%M:%S')" > {{ log_file }}
      args:
        executable: /bin/bash

  tasks:
    - name: Exibir nó alvo e namespace
      ansible.builtin.debug:
        msg: "Implantando TriSLA Portal no host {{ inventory_hostname }} no namespace {{ namespace }}"

    - name: Garantir que o namespace exista
      ansible.builtin.shell: |
        kubectl get ns {{ namespace }} >/dev/null 2>&1 || kubectl create ns {{ namespace }}
        echo "[Namespace] Verificado/Criação realizada com sucesso em $(date '+%H:%M:%S')" >> {{ log_file }}
      args:
        executable: /bin/bash
      register: ns_check
      changed_when: "'created' in ns_check.stdout"
      ignore_errors: true

    - name: Criar ou atualizar secret GHCR
      ansible.builtin.shell: |
        echo "[GHCR] Atualizando secret em $(date '+%H:%M:%S')" >> {{ log_file }}                                                                               
        kubectl delete secret ghcr-creds -n {{ namespace }} --ignore-not-found  
        kubectl create secret docker-registry ghcr-creds \
          --docker-server=ghcr.io \
          --docker-username={{ ghcr_username | default('abelisboa') }} \
          --docker-password={{ ghcr_token | default('') }} \
          --namespace {{ namespace }}
      register: ghcr_secret
      changed_when: "'created' in ghcr_secret.stdout"
      ignore_errors: false
      # IMPORTANT: Definir ghcr_token como variável de ambiente ou em group_vars/all.yml
      # Exemplo: export ANSIBLE_VAR_ghcr_token="your_token_here"
      # Ou usar Ansible Vault para maior segurança

    - name: Remover release Helm anterior (se bloqueada)
      ansible.builtin.shell: |
        echo "[Helm] Removendo release antiga (se existir) — $(date '+%H:%M:%S')" >> {{ log_file }}
        helm uninstall trisla-portal -n {{ namespace }} --wait || true
        kubectl delete secret -n {{ namespace }} -l "owner=helm,name=trisla-portal" --ignore-not-found
      register: helm_uninstall
      changed_when: "'uninstalled' in helm_uninstall.stdout or 'deleted' in helm_uninstall.stdout"
      ignore_errors: true

    - name: Remover ServiceMonitor antigo (todos os namespaces)
      ansible.builtin.shell: |
        echo "[ServiceMonitor] Limpando antigos em $(date '+%H:%M:%S')" >> {{ log_file }}
        for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
          if kubectl get servicemonitor -n $ns 2>/dev/null | grep -q trisla-portal-servicemonitor; then
            echo "Removendo ServiceMonitor existente em $ns" >> {{ log_file }}
            kubectl delete servicemonitor trisla-portal-servicemonitor -n $ns --ignore-not-found
          fi
        done
      args:
        executable: /bin/bash
      register: sm_cleanup
      changed_when: "'Removendo' in sm_cleanup.stdout"
      ignore_errors: true

    - name: 🔍 Pré-checagem e Liberação de Locks Helm
      ansible.builtin.shell: |
        echo "[Preflight] Executando pré-checagem e liberação de locks — $(date '+%H:%M:%S')" >> {{ log_file }}
        helm history trisla-portal -n {{ namespace }} || true
        echo "🧹 Limpando secrets Helm antigos..." >> {{ log_file }}
        kubectl delete secret -n {{ namespace }} -l "owner=helm,name=trisla-portal" --ignore-not-found
        echo "🧹 Removendo possíveis ServiceMonitors órfãos..." >> {{ log_file }}
        for ns in $(kubectl get ns -o jsonpath='{.items[*].metadata.name}'); do
          kubectl get servicemonitor -n $ns 2>/dev/null | grep -q trisla-portal && \
          kubectl delete servicemonitor trisla-portal-servicemonitor -n $ns --ignore-not-found || true
        done
        echo "[Preflight] Concluído — $(date '+%H:%M:%S')" >> {{ log_file }}
      args:
        executable: /bin/bash
      register: preflight_cleanup
      changed_when: "'deleted' in preflight_cleanup.stdout or 'Removendo' in preflight_cleanup.stdout"
      ignore_errors: true

    - name: Recriar deployment via Helm (v3.6)
      ansible.builtin.shell: |
        echo "[Helm] Iniciando upgrade/install em $(date '+%H:%M:%S')" >> {{ log_file }}
        helm upgrade --install trisla-portal {{ helm_chart_path }} \
          -n {{ namespace }} \
          -f {{ values_file }} \
          --set backend.image="{{ backend_image }}" \
          --set frontend.image="{{ frontend_image }}" \
          --set backend.pullPolicy="Always" \
          --set frontend.pullPolicy="Always" \
          --atomic --cleanup-on-fail --wait --timeout 10m | tee -a {{ log_file }}
        echo "[Helm] Concluído em $(date '+%H:%M:%S')" >> {{ log_file }}
      register: helm_deploy
      changed_when: "'deployed' in helm_deploy.stdout or 'Release' in helm_deploy.stdout"
      ignore_errors: false

  post_tasks:
    - name: Exibir resultado final e local do log
      ansible.builtin.debug:
        msg: |
          ✅ Implantação TriSLA Portal concluída
          - Namespace: {{ namespace }}
          - Release: trisla-portal
          - Log salvo em: {{ log_file }}
