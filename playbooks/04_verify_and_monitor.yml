- name: Verify TriSLA status and collect metrics
  hosts: node1
  become: yes

  tasks:
    - name: Get running pods
      shell: kubectl get pods -n trisla
      register: pods
    - debug:
        var: pods.stdout

    - name: Get services
      shell: kubectl get svc -n trisla -o wide
      register: svcs
    - debug:
        var: svcs.stdout

    - name: Check backend logs
      shell: kubectl logs -n trisla -l app=trisla-portal --tail=20
      register: logs
    - debug:
        var: logs.stdout
