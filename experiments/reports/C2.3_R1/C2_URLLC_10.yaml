# Template Experimental - Cenário C2_URLLC_3
# 10 SLAs simultâneos do tipo URLLC

scenario_id: "C2_URLLC_10"
description: "Cenário de carga com 10 SLAs simultâneos do tipo URLLC (Ultra-Reliable Low-Latency Communications)"

environment:
  platform: "NASP"
  namespace: "trisla-experiments"
  version: "v3.7.0"
  cluster: "production"

sla_profile:
  type: "URLLC"
  qos_requirements:
    latency: "5ms"
    throughput: "50Mbps"
    reliability: 0.99999
    jitter: "1ms"
  slice_characteristics:
    priority: "high"
    duration: "indefinite"

execution:
  quantity: 10
  mode: "sequential"  # Submete um por vez, aguardando conclusão
  interval_seconds: 5  # Intervalo entre submissões
  timeout_seconds: 300  # Timeout máximo por SLA
  retry_on_failure: false  # Não fazer retry automático

metrics_expected:
  decision_time:
    unit: "milliseconds"
    expected_range: [100, 5000]
  end_to_end_time:
    unit: "milliseconds"
    expected_range: [200, 10000]
  acceptance_rate:
    unit: "percentage"
    expected_range: [0, 100]

data_collection:
  prometheus:
    enabled: true
    metrics:
      - "trisla_decision_engine_decisions_total"
      - "trisla_decision_engine_decision_duration_seconds"
      - "trisla_ml_nsmf_predictions_total"
      - "trisla_sem_csmf_intents_processed_total"
    time_range_minutes: 20
  logs:
    enabled: true
    components:
      - "decision-engine"
      - "ml-nsmf"
      - "sem-csmf"
      - "bc-nssmf"
    preserve_timestamps: true

stop_conditions:
  max_execution_time_minutes: 20
  max_failures: 1  # Parar se mais de 1 SLA falhar
  system_unavailable: true  # Parar se sistema ficar indisponível

metadata:
  created: "2025-01-27"
  purpose: "Avaliar comportamento do sistema com SLAs URLLC (requisitos rigorosos de latência e confiabilidade)"
  expected_outcome: "Sistema deve processar todos os SLAs, possivelmente com decisões RENEG devido aos requisitos rigorosos"

